<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Professores</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/pages/listar-alunos.css">
</head>
<body class="page-shell">
    <main class="page page-list">
        <section class="section-header section-header-split">
            <div>
                <p class="eyebrow">PAINEL //</p>
                <h1>Lista de Professores</h1>
                <p class="section-copy">Visualize, edite e remova registros existentes sem alterar o fluxo do sistema.</p>
            </div>
            <a class="button-primary" href="/professores/criar">Criar novo Professor</a>
        </section>

        <section class="table-panel">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Graduacao</th>
                        <th>RM</th>
                        <th>Disciplina</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="professor : ${professores}">
                        <td th:text="${professor.idProfessor}"></td>
                        <td th:text="${professor.nome}"></td>
                        <td th:text="${professor.telefone}"></td>
                        <td th:text="${professor.graduacao}"></td>
                        <td th:text="${professor.rm}"></td>
                        <td th:text="${professor.disciplina.nome}"></td>
                        <td>
                            <div class="table-actions">
                                <a class="table-action" th:href="@{/professores/editar/{id}(id=${professor.idProfessor})}">Editar</a>
                                <a class="table-action danger" th:href="@{/professores/excluir/{id}(id=${professor.idProfessor})}" onclick="return confirm('Tem certeza que deseja excluir este professor?');">Excluir</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
