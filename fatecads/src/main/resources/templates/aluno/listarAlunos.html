<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Alunos</title>
</head>
<body>
    <h1>Lista de Alunos</h1>
    <h2>
        <a href="/alunos/criar">Criar novo Aluno</a>
    </h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>CPF</th>
                <th>RA</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="aluno : ${alunos}">
                <td th:text="${aluno.idAluno}"></td>
                <td th:text="${aluno.nomeAluno}"></td>
                <td th:text="${aluno.emailAluno}"></td>
                <td th:text="${aluno.telefoneAluno}"></td>
                <td th:text="${aluno.enderecoAluno}"></td>
                <td th:text="${aluno.cpfAluno}"></td>
                <td th:text="${aluno.raAluno}"></td>
                <td>
                    <a th:href="@{/alunos/editar/{id}(id=${aluno.idAluno})}">Editar</a> |
                    <a th:href="@{/alunos/excluir/{id}(id=${aluno.idAluno})}" onclick="return confirm('Tem certeza que deseja excluir este aluno?');">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
