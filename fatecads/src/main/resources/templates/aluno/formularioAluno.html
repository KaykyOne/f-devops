<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Alunos</title>
</head>
<body>
    <h1>Cadastrar Alunos</h1>
    <form method="post" th:action="@{/alunos/salvar}" th:object="${aluno}">
        <label for="nomeAluno">Nome:</label>
        <input type="text" id="nomeAluno" th:field="*{nomeAluno}" required><br><br>

        <label for="emailAluno">Email:</label>
        <input type="email" id="emailAluno" th:field="*{emailAluno}"><br><br>

        <label for="telefoneAluno">Telefone:</label>
        <input type="tel" id="telefoneAluno" th:field="*{telefoneAluno}" required><br><br>

        <label for="enderecoAluno">Endereço:</label>
        <input type="text" id="enderecoAluno" th:field="*{enderecoAluno}" required><br><br>

        <label for="cpfAluno">CPF:</label>
        <input type="text" id="cpfAluno" th:field="*{cpfAluno}" required><br><br>

        <label for="raAluno">RA:</label>
        <input type="text" id="raAluno" th:field="*{raAluno}" required><br><br>

        <button type="submit">Cadastrar</button>
    </form>     
</body>
</html>
