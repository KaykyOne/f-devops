<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Alunos</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/pages/formulario-aluno.css">
</head>
<body class="page-shell">
    <main class="page page-form">
        <section class="section-header">
            <p class="eyebrow">CADASTRO //</p>
            <h1>Cadastrar Alunos</h1>
            <p class="section-copy">Preencha os dados abaixo para inserir um novo aluno no sistema.</p>
        </section>

        <Form class="brutal-form" method="post" th:action="@{/alunos/salvar}" th:object="${aluno}">
            <div class="form-grid">
                <input type="hidden" th:field="*{idAluno}">
                <label class="field" for="nomeAluno">
                    <span>Nome</span>
                    <input type="text" id="nomeAluno" th:field="*{nomeAluno}" required>
                </label>

                <label class="field" for="emailAluno">
                    <span>Email</span>
                    <input type="email" id="emailAluno" th:field="*{emailAluno}">
                </label>

                <label class="field" for="telefoneAluno">
                    <span>Telefone</span>
                    <input type="tel" id="telefoneAluno" th:field="*{telefoneAluno}" required>
                </label>

                <label class="field field-full" for="enderecoAluno">
                    <span>Endereco</span>
                    <input type="text" id="enderecoAluno" th:field="*{enderecoAluno}" required>
                </label>

                <label class="field" for="cpfAluno">
                    <span>CPF</span>
                    <input type="text" id="cpfAluno" th:field="*{cpfAluno}" required>
                </label>

                <label class="field" for="raAluno">
                    <span>RA</span>
                    <input type="text" id="raAluno" th:field="*{raAluno}" required>
                </label>

                <div>
                    <label for="cursoAluno">
                        <span>Curso</span>
                    </label>
                    <select class="field" th:field="*{curso}">
                        <option value="" disabled selected>Selecione o curso</option>
                        <option 
                            th:each="curso : ${cursos}" 
                            th:value="${curso.idCurso}"
                            th:text="${curso.nome}">
                        </option>
                    </select>
                </div>

            </div>

            <div class="actions-row">
                <button class="button-primary" type="submit">Cadastrar</button>
                <a class="button-secondary" href="/alunos/listar">Voltar para a lista</a>
            </div>
        </Form>
    </main>
</body>
</html>
