<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Cursos</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/pages/listar-alunos.css">
</head>
<body class="page-shell">
    <main class="page page-list">
        <section class="section-header section-header-split">
            <div>
                <p class="eyebrow">PAINEL //</p>
                <h1>Lista de Cursos</h1>
                <p class="section-copy">Visualize, edite e remova registros existentes sem alterar o fluxo do sistema.</p>
            </div>
            <a class="button-primary" href="/cursos/criar">Criar novo Curso</a>
        </section>

        <section class="table-panel">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Periodo</th>
                        <th>Carga Horaria</th>
                        <th>Disciplina</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.idCurso}"></td>
                        <td th:text="${curso.nome}"></td>
                        <td th:text="${curso.periodo}"></td>
                        <td th:text="${curso.cargaHoraria}"></td>
                        <td th:text="${curso.disciplina.nome}">
                            <div class="table-actions">
                                <a class="table-action" th:href="@{/cursos/editar/{id}(id=${curso.idCurso})}">Editar</a>
                                <a class="table-action danger" th:href="@{/cursos/excluir/{id}(id=${curso.idCurso})}" onclick="return confirm('Tem certeza que deseja excluir este curso?');">Excluir</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
